<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polyglot — 现代西班牙语</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1a9e6e;--green-l:#e6f7f1;--green-d:#0d6b4a;
  --blue:#2563eb;--blue-l:#eff6ff;
  --amber:#d97706;--amber-l:#fffbeb;
  --red:#dc2626;--red-l:#fef2f2;
  --text:#111;--text2:#555;--text3:#888;
  --border:#e5e5e5;--bg:#fafaf8;--white:#fff;
  --r:12px;--rs:8px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
/* NAV */
nav{padding:.875rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--white);position:sticky;top:0;z-index:100}
.logo{font-family:'DM Serif Display',serif;font-size:1.3rem;display:flex;align-items:center;gap:8px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
.nav-lang{font-size:.8rem;color:var(--text3)}
/* SCREENS */
.screen{display:none}.screen.active{display:block}
/* CONTAINER */
.wrap{max-width:720px;margin:0 auto;padding:0 1.5rem 4rem}
/* SETUP */
.hero{text-align:center;padding:3.5rem 1rem 2rem}
.hero h1{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,4vw,2.6rem);line-height:1.2;margin-bottom:.75rem}
.hero p{font-size:1rem;color:var(--text2);max-width:440px;margin:0 auto}
.steps{display:flex;gap:6px;margin-bottom:1.5rem}
.step-dot{height:3px;width:28px;border-radius:99px;background:var(--border);transition:background .2s}
.step-dot.on{background:var(--green)}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem}
.card-title{font-size:.95rem;font-weight:600;margin-bottom:.2rem}
.card-sub{font-size:.825rem;color:var(--text3);margin-bottom:1.1rem}
.lang-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-bottom:1rem}
.lb{background:var(--white);border:1px solid var(--border);border-radius:var(--rs);padding:9px 11px;cursor:pointer;display:flex;flex-direction:column;gap:3px;text-align:left;transition:border-color .15s}
.lb:hover{border-color:#aaa}
.lb.native{border:2px solid var(--blue);background:var(--blue-l)}
.lb.known{border:2px solid var(--green);background:var(--green-l)}
.lf{font-size:1.3rem}.ln{font-size:.78rem;font-weight:500}
.ls{font-size:.68rem;padding:1px 6px;border-radius:99px;width:fit-content}
.ls.native{background:#bfdbfe;color:#1e40af}.ls.known{background:#a7f3d0;color:#065f46}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--rs);font-size:.875rem;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text);transition:background .12s}
.btn:hover{background:var(--bg)}
.btn.primary{background:var(--green);color:#fff;border-color:var(--green)}
.btn.primary:hover{background:var(--green-d)}
.btn.ghost{border-color:transparent;background:transparent;color:var(--text2);padding-left:0}
.btn-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-top:1rem}
/* COURSE */
.profile-bar{display:flex;align-items:center;gap:10px;padding:9px 13px;background:var(--white);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:1.5rem;font-size:.83rem;color:var(--text2)}
.pf{font-size:1rem}
.pc{margin-left:auto;font-size:.78rem;color:var(--text3);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif}
.pc:hover{color:var(--text)}
.section-lbl{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.75rem}
.phase-block{margin-bottom:2rem}
.phase-title{font-size:.85rem;font-weight:600;color:var(--text2);margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid var(--border)}
.lesson-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--white);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:6px;cursor:pointer;transition:border-color .15s,box-shadow .15s}
.lesson-row:hover{border-color:var(--green);box-shadow:0 2px 10px rgba(26,158,110,.07)}
.lesson-row.locked{opacity:.45;cursor:not-allowed}
.lesson-row.done .lr-num{background:var(--green);color:#fff;border-color:var(--green)}
.lr-num{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;color:var(--text3);flex-shrink:0}
.lr-info{flex:1}
.lr-title{font-size:.875rem;font-weight:500}
.lr-sub{font-size:.775rem;color:var(--text3)}
.lr-tag{font-size:.68rem;padding:2px 7px;border-radius:99px;font-weight:500;flex-shrink:0}
.tg{background:#ede9fe;color:#5b21b6}
.tv{background:var(--green-l);color:var(--green-d)}
.tp{background:#fce7f3;color:#9d174d}
/* LESSON */
.back-btn{display:inline-flex;align-items:center;gap:4px;color:var(--text3);font-size:.83rem;cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;padding:0;margin-bottom:1.5rem}
.back-btn:hover{color:var(--text)}
.lesson-header{margin-bottom:1.5rem}
.lesson-phase{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.3rem}
.lesson-title-big{font-size:1.4rem;font-weight:600;margin-bottom:.25rem}
.lesson-goal{font-size:.875rem;color:var(--text2)}
/* TABS */
.tabs{display:flex;gap:3px;background:var(--bg);border-radius:var(--rs);padding:3px;margin-bottom:1.5rem;width:fit-content}
.tab{padding:6px 16px;border-radius:calc(var(--rs) - 2px);font-size:.825rem;cursor:pointer;border:none;background:transparent;color:var(--text3);font-family:'DM Sans',sans-serif;transition:background .12s,color .12s}
.tab.active{background:var(--white);color:var(--text);border:1px solid var(--border);font-weight:500}
.tab-pane{display:none}.tab-pane.active{display:block}
/* CONTENT AREA */
.content-box{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:1.5rem;min-height:160px}
.loading{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:.875rem;padding:1.5rem 0}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* AI CONTENT */
.ai-c{font-size:.9rem;line-height:1.85;color:var(--text)}
.ai-c h3{font-size:.95rem;font-weight:600;margin:1.2rem 0 .4rem;color:var(--text)}
.ai-c h3:first-child{margin-top:0}
.ai-c p{margin-bottom:.65rem}
.ai-c table{width:100%;border-collapse:collapse;font-size:.83rem;margin:.75rem 0}
.ai-c th{text-align:left;padding:6px 10px;background:var(--bg);border:1px solid var(--border);font-weight:600;color:var(--text2)}
.ai-c td{padding:6px 10px;border:1px solid var(--border)}
.ai-c tr:nth-child(even) td{background:var(--bg)}
.ai-c .tip{background:var(--green-l);border-left:3px solid var(--green);border-radius:0 var(--rs) var(--rs) 0;padding:.65rem 1rem;margin:.75rem 0;font-size:.85rem;color:var(--green-d)}
.ai-c strong{font-weight:600}
/* EXAMPLES */
.ex-list{display:flex;flex-direction:column;gap:10px}
.ex-item{background:var(--white);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.ex-text{flex:1}
.ex-es{font-size:.95rem;font-weight:500;color:var(--text);margin-bottom:2px}
.ex-zh{font-size:.825rem;color:var(--text3)}
.speak-btn{background:none;border:1px solid var(--border);border-radius:var(--rs);padding:5px 9px;cursor:pointer;font-size:.8rem;color:var(--text3);display:flex;align-items:center;gap:4px;white-space:nowrap;transition:border-color .12s,color .12s;flex-shrink:0}
.speak-btn:hover{border-color:var(--green);color:var(--green)}
.speak-btn.playing{border-color:var(--green);color:var(--green);background:var(--green-l)}
/* QUIZ */
.quiz-q{margin-bottom:1.5rem}
.quiz-num{font-size:.72rem;color:var(--text3);margin-bottom:.3rem}
.quiz-text{font-size:.95rem;font-weight:500;margin-bottom:.75rem}
.quiz-opts{display:flex;flex-direction:column;gap:7px}
.quiz-opt{background:var(--white);border:1px solid var(--border);border-radius:var(--rs);padding:10px 14px;cursor:pointer;font-size:.875rem;text-align:left;font-family:'DM Sans',sans-serif;transition:border-color .12s,background .12s;width:100%}
.quiz-opt:hover:not(:disabled){border-color:var(--green);background:var(--green-l)}
.quiz-opt.correct{border-color:var(--green)!important;background:var(--green-l)!important;color:var(--green-d)!important}
.quiz-opt.wrong{border-color:var(--red)!important;background:var(--red-l)!important;color:var(--red)!important}
.quiz-opt:disabled{cursor:default}
.quiz-result{margin-top:1rem;padding:.75rem 1rem;border-radius:var(--rs);font-size:.875rem}
.quiz-result.pass{background:var(--green-l);color:var(--green-d)}
.quiz-result.fail{background:var(--amber-l);color:var(--amber)}
/* NEXT BTN */
.next-lesson{margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;justify-content:flex-end}
@media(max-width:480px){nav{padding:.875rem 1rem}.wrap{padding:0 1rem 3rem}}
</style>
</head>
<body>

<nav>
  <div class="logo"><div class="logo-dot"></div> Polyglot</div>
  <div class="nav-lang" id="nav-lang"></div>
</nav>

<!-- ══ SETUP ══ -->
<div id="screen-setup" class="screen active">
  <div class="hero">
    <h1>用你已会的语言<br>学西班牙语</h1>
    <p>按《现代西班牙语》教材体系，AI 根据你的语言背景量身讲解每一个知识点。</p>
  </div>
  <div class="wrap">
    <div class="steps">
      <div class="step-dot on" id="d1"></div>
      <div class="step-dot" id="d2"></div>
    </div>
    <div id="s1">
      <div class="card">
        <div class="card-title">你已经掌握哪些语言？</div>
        <div class="card-sub">点一次 = 母语（蓝），再点 = 已掌握（绿），再点 = 取消</div>
        <div class="lang-grid" id="known-grid"></div>
      </div>
      <div class="btn-row"><button class="btn primary" onclick="toS2()">下一步 →</button></div>
    </div>
    <div id="s2" style="display:none">
      <div class="card" style="background:var(--green-l);border-color:#a7f3d0">
        <div class="card-title">🎯 你的目标语言</div>
        <div style="display:flex;align-items:center;gap:12px;margin-top:.5rem">
          <span style="font-size:2rem">🇪🇸</span>
          <div>
            <div style="font-size:1.1rem;font-weight:600">西班牙语</div>
            <div style="font-size:.825rem;color:var(--text2)">基于《现代西班牙语》（董燕生·刘建）第一册</div>
          </div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn ghost" onclick="toS1()">← 返回</button>
        <button class="btn primary" onclick="startApp()">开始学习 →</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ COURSE ══ -->
<div id="screen-course" class="screen">
  <div class="wrap" style="padding-top:1.5rem">
    <div class="profile-bar">
      <span class="pf" id="pf-flags"></span>
      <span id="pf-text"></span>
      <button class="pc" onclick="showScreen('screen-setup')">修改</button>
    </div>
    <div class="section-lbl">《现代西班牙语》第一册 · 24课</div>
    <div id="course-list"></div>
  </div>
</div>

<!-- ══ LESSON ══ -->
<div id="screen-lesson" class="screen">
  <div class="wrap" style="padding-top:1.5rem">
    <button class="back-btn" onclick="showScreen('screen-course')">← 课程列表</button>
    <div class="lesson-header">
      <div class="lesson-phase" id="l-phase"></div>
      <div class="lesson-title-big" id="l-title"></div>
      <div class="lesson-goal" id="l-goal"></div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('explain',this)">讲解</button>
      <button class="tab" onclick="switchTab('examples',this)">例句</button>
      <button class="tab" onclick="switchTab('quiz',this)">测验</button>
    </div>
    <div id="tab-explain" class="tab-pane active">
      <div class="content-box" id="explain-content"></div>
    </div>
    <div id="tab-examples" class="tab-pane">
      <div class="ex-list" id="examples-list"></div>
    </div>
    <div id="tab-quiz" class="tab-pane">
      <div id="quiz-content"></div>
    </div>
    <div class="next-lesson" id="next-area" style="display:none">
      <button class="btn primary" onclick="goNextLesson()">下一课 →</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────
const LANGS=[
  {code:'zh',flag:'🇨🇳',name:'中文'},{code:'en',flag:'🇬🇧',name:'英语'},
  {code:'fr',flag:'🇫🇷',name:'法语'},{code:'it',flag:'🇮🇹',name:'意大利语'},
  {code:'pt',flag:'🇧🇷',name:'葡萄牙语'},{code:'de',flag:'🇩🇪',name:'德语'},
  {code:'ja',flag:'🇯🇵',name:'日语'},{code:'ko',flag:'🇰🇷',name:'韩语'},
  {code:'ru',flag:'🇷🇺',name:'俄语'},{code:'ar',flag:'🇸🇦',name:'阿拉伯语'},
];

const CURRICULUM=[
  {phase:'第一阶段·发音基础（第1–12课）',lessons:[
    {id:1,title:'字母表与基本发音',tag:'发音',tagClass:'tp',goal:'认识西班牙语29个字母，掌握每个字母的读音',
     examples:[
       {es:'A, a — "a"',zh:'读如中文"啊"，嘴巴大开'},
       {es:'E, e — "e"',zh:'读如中文"诶"，嘴角略展'},
       {es:'I, i — "i"',zh:'读如中文"衣"，嘴角拉开'},
       {es:'O, o — "o"',zh:'读如中文"哦"，嘴唇圆'},
       {es:'U, u — "u"',zh:'读如中文"乌"，嘴唇突出'},
     ],
     quiz:[
       {q:'西班牙语字母表共有多少个字母？',opts:['26个','28个','29个','30个'],ans:2},
       {q:'西班牙语中哪个字母在英语里没有？',opts:['W','Ñ','K','X'],ans:1},
       {q:'字母"H"在西班牙语中如何发音？',opts:['读/h/音','读/x/音','不发音','读/j/音'],ans:2},
     ]},
    {id:2,title:'元音与辅音：发音规则',tag:'发音',tagClass:'tp',goal:'掌握5个元音的准确发音，了解主要辅音规则',
     examples:[
       {es:'casa',zh:'[ˈkasa] 房子 — 每个元音都清晰发音'},
       {es:'libro',zh:'[ˈliβɾo] 书 — b/v 在元音间发近似摩擦音'},
       {es:'gato',zh:'[ˈɡato] 猫 — g 在 a/o/u 前发/g/'},
       {es:'gente',zh:'[ˈxente] 人们 — g 在 e/i 前发/x/（类似中文"喝"）'},
       {es:'ciudad',zh:'[θjuˈðað] 城市 — d 在词尾弱化'},
     ],
     quiz:[
       {q:'"Gato"中字母G的发音是？',opts:['/x/ 如"喝"','/g/ 如"哥"','/h/ 如英语hot','/ɣ/ 摩擦音'],ans:1},
       {q:'西班牙语元音有几个？',opts:['4个','5个','6个','7个'],ans:1},
       {q:'"Jamón"（火腿）中J发什么音？',opts:['/dʒ/ 如英语jump','/j/ 如英语yes','/x/ 类似中文"喝"','/ʒ/ 如法语'],ans:2},
     ]},
    {id:3,title:'音节与重音规则',tag:'发音',tagClass:'tp',goal:'学会划分音节，掌握西班牙语重音规律',
     examples:[
       {es:'ca-sa',zh:'重音在倒数第二音节 → CA-sa'},
       {es:'ha-blar',zh:'以辅音r结尾 → 重音在最后音节 ha-BLAR'},
       {es:'á-rbol',zh:'有重音符号 → 按符号来 ÁR-bol（树）'},
       {es:'ca-fé',zh:'有重音符号 → 最后音节 ca-FÉ（咖啡）'},
       {es:'mú-si-ca',zh:'有重音符号 → 倒数第三音节 MÚ-si-ca（音乐）'},
     ],
     quiz:[
       {q:'"Hablar"的重音在哪个音节？',opts:['HA-blar','ha-BLAR','两个一样重','没有重音'],ans:1},
       {q:'有重音符号时，重音规则是？',opts:['忽略符号按规律','按符号位置','永远在最后','永远在第一'],ans:1},
       {q:'"América"重音在哪？',opts:['A-mé-ri-ca第一','a-MÉ-ri-ca第二','a-mé-RI-ca第三','a-mé-ri-CA第四'],ans:0},
     ]},
    {id:4,title:'特殊字母：RR、LL、Ñ',tag:'发音',tagClass:'tp',goal:'掌握西班牙语特有字母的发音方法',
     examples:[
       {es:'perro',zh:'[ˈpeRo] 狗 — rr 是颤音，舌尖快速颤动'},
       {es:'pero',zh:'[ˈpeɾo] 但是 — 单r 是弹音，只弹一次'},
       {es:'llamo',zh:'[ˈʎamo] 我叫 — ll 发/y/音（拉美）'},
       {es:'España',zh:'[esˈpaɲa] 西班牙 — ñ 发/ɲ/，类似"泥"的鼻音'},
       {es:'mañana',zh:'[maˈɲana] 明天/早上 — ñ 的常见词'},
     ],
     quiz:[
       {q:'"Perro"（狗）和"pero"（但是）的区别是？',opts:['意思相同','r和rr发音不同','拼写完全一样','重音不同'],ans:1},
       {q:'"Ñ"的发音类似中文哪个音？',opts:['"呢"中的n','"妮"中的ni前鼻化音','"泥"的鼻化音ɲ','"恩"'],ans:2},
       {q:'以下哪个词含有颤音rr？',opts:['pero','para','perro','primo'],ans:2},
     ]},
    {id:5,title:'连读与语调',tag:'发音',tagClass:'tp',goal:'了解西班牙语连读规则和基本语调模式',
     examples:[
       {es:'los amigos',zh:'连读：[lo sa ˈmiɣos] — 词尾辅音与下词首元音相连'},
       {es:'¿Cómo estás?',zh:'[ˈkomo esˈtas] — 连读，语调先升后降'},
       {es:'¡Hola!',zh:'感叹句：语调下降'},
       {es:'¿Hablas español?',zh:'疑问句：语调上升'},
       {es:'Habla bien.',zh:'陈述句：语调平稳后下降'},
     ],
     quiz:[
       {q:'西班牙语疑问句末尾语调通常？',opts:['下降','上升','平稳','先升后降'],ans:1},
       {q:'"los amigos"连读后听起来像？',opts:['lo sa-mi-gos','los a-mi-gos','lo-sa-mi-gos','los-a-mi-gos'],ans:0},
       {q:'西班牙语标点符号的特点是？',opts:['和英语完全一样','句首加倒置标点','只在句末加标点','不用标点'],ans:1},
     ]},
    {id:6,title:'数字 0–30',tag:'词汇',tagClass:'tv',goal:'掌握0到30的数字说法，了解数字发音规律',
     examples:[
       {es:'cero, uno, dos, tres',zh:'0, 1, 2, 3'},
       {es:'diez, once, doce, trece',zh:'10, 11, 12, 13 — 11-15不规则须记忆'},
       {es:'veinte, veintiuno',zh:'20, 21 — veinti+ 组合'},
       {es:'treinta y uno',zh:'31 — 30以上用 y（和）连接'},
       {es:'Tengo veintidós años.',zh:'我22岁。— 年龄常用句'},
     ],
     quiz:[
       {q:'"Quince"是数字几？',opts:['13','14','15','16'],ans:2},
       {q:'21如何拼写？',opts:['veinte y uno','veintiuno','vientuno','veinte uno'],ans:1},

let S={native:null,known:[],progress:{}};
let curLesson=null, curLessonIdx=0, curPhaseIdx=0;
let explainCache={};

// ─── INIT ───────────────────────────────────────────────
renderKnownGrid();

function getLang(c){return LANGS.find(l=>l.code===c)}
function allLessons(){return CURRICULUM.flatMap(p=>p.lessons)}

// ─── SETUP ──────────────────────────────────────────────
function renderKnownGrid(){
  const g=document.getElementById('known-grid');g.innerHTML='';
  LANGS.forEach(lang=>{
    const isN=S.native===lang.code,isK=S.known.includes(lang.code);
    const b=document.createElement('button');
    b.className='lb'+(isN?' native':isK?' known':'');
    b.innerHTML=`<span class="lf">${lang.flag}</span><span class="ln">${lang.name}</span>${isN?'<span class="ls native">母语</span>':isK?'<span class="ls known">已掌握</span>':''}`;
    b.onclick=()=>toggleK(lang.code);g.appendChild(b);
  });
}
function toggleK(c){
  if(S.native===c){S.native=null;}
  else if(S.known.includes(c)){S.known=S.known.filter(x=>x!==c);}
  else if(!S.native){S.native=c;}
  else if(!S.known.includes(c)){S.known.push(c);}
  renderKnownGrid();
}
function toS2(){
  if(!S.native){alert('请先选择你的母语');return;}
  document.getElementById('s1').style.display='none';
  document.getElementById('s2').style.display='block';
  document.getElementById('d2').classList.add('on');
}
function toS1(){
  document.getElementById('s2').style.display='none';
  document.getElementById('s1').style.display='block';
  document.getElementById('d2').classList.remove('on');
}
function startApp(){
  renderCourse();showScreen('screen-course');
}

// ─── COURSE ─────────────────────────────────────────────
function renderCourse(){
  const n=getLang(S.native),kl=S.known.map(getLang);
  document.getElementById('pf-flags').textContent=[n,...kl].map(l=>l.flag).join(' ');
  document.getElementById('pf-text').textContent='正在学 🇪🇸 西班牙语';
  document.getElementById('nav-lang').textContent=[n,...kl].map(l=>l.name).join('·')+' → 西班牙语';
  const cl=document.getElementById('course-list');cl.innerHTML='';
  CURRICULUM.forEach((phase,pi)=>{
    const pb=document.createElement('div');pb.className='phase-block';
    pb.innerHTML=`<div class="phase-title">${phase.phase}</div>`;
    phase.lessons.forEach((lesson,li)=>{
      const done=S.progress[lesson.id]==='done';
      const row=document.createElement('div');
      row.className='lesson-row'+(done?' done':'');
      row.innerHTML=`
        <div class="lr-num">${done?'✓':lesson.id}</div>
        <div class="lr-info">
          <div class="lr-title">${lesson.title}</div>
          <div class="lr-sub">${lesson.goal}</div>
        </div>
        <span class="lr-tag ${lesson.tagClass}">${lesson.tag}</span>`;
      row.onclick=()=>openLesson(lesson,pi,li);
      pb.appendChild(row);
    });
    cl.appendChild(pb);
  });
}

// ─── LESSON ─────────────────────────────────────────────
function openLesson(lesson,pi,li){
  curLesson=lesson;curPhaseIdx=pi;curLessonIdx=li;
  document.getElementById('l-phase').textContent=CURRICULUM[pi].phase.split('·')[0];
  document.getElementById('l-title').textContent=lesson.title;
  document.getElementById('l-goal').textContent='本课目标：'+lesson.goal;
  document.getElementById('next-area').style.display='none';
  switchTab('explain',document.querySelector('.tab'));
  showScreen('screen-lesson');
  loadExplain(lesson);
  renderExamples(lesson);
  renderQuiz(lesson);
}

function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  document.querySelectorAll('.tab')[['explain','examples','quiz'].indexOf(name)]?.classList.add('active');
}

// ─── EXPLAIN (AI) ────────────────────────────────────────
async function loadExplain(lesson){
  const box=document.getElementById('explain-content');
  if(explainCache[lesson.id]){box.innerHTML=explainCache[lesson.id];return;}
  box.innerHTML='<div class="loading"><div class="spinner"></div> AI 正在根据你的语言背景生成讲解…</div>';
  const n=getLang(S.native),kl=S.known.map(getLang);
  const system=`你是专业的西班牙语教师，擅长利用学习者已有的语言知识来讲解西班牙语。

学习者背景：
- 母语：${n.name}
- 已掌握：${kl.length>0?kl.map(l=>l.name).join('、'):'无其他语言'}
- 教材：《现代西班牙语》第一册（董燕生·刘建）
- 当前课：第${lesson.id}课《${lesson.title}》
- 本课目标：${lesson.goal}

讲解要求：
1. 用学习者母语（${n.name}）主讲
2. 如果学习者掌握其他语言，在适当时候用那些语言举类比（例如：英语母语者可对比英语语法）
3. 主动指出与学习者已知语言的相同点和不同点
4. 对关键记忆点写"💡迁移提示："开头的提示
5. 用Markdown格式：###标题，**加粗**关键词，Markdown表格
6. 长度：400-600字，精炼不啰嗦，聚焦本课核心`;

  const msg=`请讲解第${lesson.id}课《${lesson.title}》。充分利用我的语言背景帮助我理解这个知识点，特别注意指出与我已知语言的异同。`;
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-5',max_tokens:1200,system,messages:[{role:'user',content:msg}]})});
    const d=await r.json();
    if(d.error){box.innerHTML=`<p style="color:var(--red)">错误：${d.error.message}</p>`;return;}
    const html=renderMD(d.content[0].text);
    explainCache[lesson.id]=html;
    box.innerHTML=html;
  }catch(e){box.innerHTML='<p style="color:var(--red)">请求失败，请检查网络后重试。</p>';}
}

// ─── EXAMPLES ───────────────────────────────────────────
function renderExamples(lesson){
  const el=document.getElementById('examples-list');el.innerHTML='';
  lesson.examples.forEach(ex=>{
    const div=document.createElement('div');div.className='ex-item';
    div.innerHTML=`<div class="ex-text"><div class="ex-es">${ex.es}</div><div class="ex-zh">${ex.zh}</div></div>
      <button class="speak-btn" onclick="speak(this,'${ex.es.replace(/'/g,"\\'")}')">🔊 朗读</button>`;
    el.appendChild(div);
  });
}

function speak(btn,text){
  if(!window.speechSynthesis){alert('你的浏览器不支持语音功能');return;}
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='es-ES';u.rate=0.85;
  document.querySelectorAll('.speak-btn').forEach(b=>b.classList.remove('playing'));
  btn.classList.add('playing');
  u.onend=()=>btn.classList.remove('playing');
  window.speechSynthesis.speak(u);
}

// ─── QUIZ ────────────────────────────────────────────────
function renderQuiz(lesson){
  const qc=document.getElementById('quiz-content');qc.innerHTML='';
  let answered=0;
  lesson.quiz.forEach((q,qi)=>{
    const div=document.createElement('div');div.className='quiz-q';
    div.innerHTML=`<div class="quiz-num">第 ${qi+1} 题 / 共 ${lesson.quiz.length} 题</div>
      <div class="quiz-text">${q.q}</div>
      <div class="quiz-opts" id="opts-${qi}"></div>
      <div class="quiz-result" id="res-${qi}" style="display:none"></div>`;
    qc.appendChild(div);
    const optsEl=div.querySelector(`#opts-${qi}`);
    q.opts.forEach((opt,oi)=>{
      const b=document.createElement('button');b.className='quiz-opt';b.textContent=opt;
      b.onclick=()=>{
        optsEl.querySelectorAll('.quiz-opt').forEach(x=>x.disabled=true);
        const resEl=div.querySelector(`#res-${qi}`);
        if(oi===q.ans){
          b.classList.add('correct');
          resEl.className='quiz-result pass';resEl.textContent='✓ 正确！';
        }else{
          b.classList.add('wrong');
          optsEl.querySelectorAll('.quiz-opt')[q.ans].classList.add('correct');
          resEl.className='quiz-result fail';resEl.textContent='✗ 错了，正确答案已标出。';
        }
        resEl.style.display='block';
        answered++;
        if(answered===lesson.quiz.length){
          S.progress[lesson.id]='done';
          document.getElementById('next-area').style.display='flex';
        }
      };
      optsEl.appendChild(b);
    });
  });
}

function goNextLesson(){
  const lessons=CURRICULUM[curPhaseIdx].lessons;
  if(curLessonIdx+1<lessons.length){
    openLesson(lessons[curLessonIdx+1],curPhaseIdx,curLessonIdx+1);
  }else if(curPhaseIdx+1<CURRICULUM.length){
    openLesson(CURRICULUM[curPhaseIdx+1].lessons[0],curPhaseIdx+1,0);
  }else{
    alert('🎉 恭喜！你完成了《现代西班牙语》第一册全部24课！');
    showScreen('screen-course');renderCourse();
  }
}

// ─── UTILS ──────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function renderMD(t){
  let h=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+)/g,(_,hd,rows)=>{
      const ths=hd.split('|').filter(s=>s.trim()).map(s=>`<th>${s.trim()}</th>`).join('');
      const trs=rows.trim().split('\n').map(r=>`<tr>${r.split('|').filter(s=>s.trim()).map(s=>`<td>${s.trim()}</td>`).join('')}</tr>`).join('');
      return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
    })
    .replace(/^###(.+)$/gm,'<h3>$1</h3>')
    .replace(/^##(.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/(💡[^\n]+)/g,'<div class="tip">$1</div>')
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
  return `<div class="ai-c"><p>${h}</p></div>`;
}
