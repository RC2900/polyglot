<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polyglot — 用你已会的语言学新语言</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #1a9e6e; --green-light: #e6f7f1; --green-dark: #0d6b4a;
    --blue: #2563eb; --blue-light: #eff6ff;
    --amber: #d97706; --amber-light: #fffbeb;
    --text: #111; --text-2: #555; --text-3: #888;
    --border: #e5e5e5; --bg: #fafaf8; --white: #fff;
    --radius: 12px; --radius-sm: 8px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
  nav { padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: var(--white); position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
  .nav-right { font-size: 0.85rem; color: var(--text-3); }
  .hero { max-width: 680px; margin: 0 auto; padding: 4rem 1.5rem 2rem; text-align: center; }
  .hero h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2rem, 5vw, 3rem); line-height: 1.2; margin-bottom: 1rem; }
  .hero p { font-size: 1.05rem; color: var(--text-2); max-width: 480px; margin: 0 auto 2rem; }
  .container { max-width: 700px; margin: 0 auto; padding: 0 1.5rem 4rem; }
  .screen { display: none; }
  .screen.active { display: block; }
  .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
  .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
  .card-sub { font-size: 0.875rem; color: var(--text-3); margin-bottom: 1.25rem; }
  .lang-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-bottom: 1rem; }
  .lang-btn { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; cursor: pointer; display: flex; flex-direction: column; gap: 3px; transition: border-color 0.15s; text-align: left; }
  .lang-btn:hover { border-color: #aaa; }
  .lang-btn.native { border: 2px solid var(--blue); background: var(--blue-light); }
  .lang-btn.known { border: 2px solid var(--green); background: var(--green-light); }
  .lang-flag { font-size: 1.4rem; }
  .lang-name { font-size: 0.8rem; font-weight: 500; color: var(--text); }
  .lang-status { font-size: 0.7rem; padding: 1px 6px; border-radius: 99px; width: fit-content; }
  .lang-status.native { background: #bfdbfe; color: #1e40af; }
  .lang-status.known { background: #a7f3d0; color: #065f46; }
  .steps { display: flex; gap: 6px; margin-bottom: 1.5rem; }
  .step-dot { height: 3px; width: 32px; border-radius: 99px; background: var(--border); transition: background 0.2s; }
  .step-dot.active { background: var(--green); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: var(--radius-sm); font-size: 0.9rem; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; border: 1px solid var(--border); background: var(--white); color: var(--text); transition: background 0.12s; }
  .btn:hover { background: var(--bg); }
  .btn.primary { background: var(--green); color: white; border-color: var(--green); }
  .btn.primary:hover { background: var(--green-dark); }
  .btn.ghost { border-color: transparent; background: transparent; color: var(--text-2); padding-left: 0; }
  .btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 1rem; }
  .lesson-item { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; margin-bottom: 0.75rem; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
  .lesson-item:hover { border-color: var(--green); box-shadow: 0 2px 12px rgba(26,158,110,0.08); }
  .lesson-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .lesson-num { font-size: 0.75rem; color: var(--text-3); }
  .tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
  .tag-grammar { background: #ede9fe; color: #5b21b6; }
  .tag-vocab { background: var(--green-light); color: var(--green-dark); }
  .tag-transfer { background: var(--amber-light); color: var(--amber); }
  .lesson-title { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
  .lesson-preview { font-size: 0.825rem; color: var(--text-3); }
  .back-btn { display: inline-flex; align-items: center; gap: 4px; color: var(--text-3); font-size: 0.85rem; cursor: pointer; background: none; border: none; font-family: 'DM Sans', sans-serif; padding: 0; margin-bottom: 1.5rem; }
  .back-btn:hover { color: var(--text); }
  .lesson-content-area { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; min-height: 200px; }
  .loading { display: flex; align-items: center; gap: 10px; color: var(--text-3); font-size: 0.9rem; padding: 2rem 0; }
  .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ai-content { font-size: 0.95rem; line-height: 1.8; color: var(--text); }
  .ai-content h3 { font-size: 1rem; font-weight: 600; margin: 1.25rem 0 0.5rem; }
  .ai-content h3:first-child { margin-top: 0; }
  .ai-content p { margin-bottom: 0.75rem; }
  .ai-content table { width: 100%; border-collapse: collapse; font-size: 0.875rem; margin: 0.75rem 0; }
  .ai-content th { text-align: left; padding: 6px 10px; background: var(--bg); border: 1px solid var(--border); font-weight: 600; color: var(--text-2); }
  .ai-content td { padding: 6px 10px; border: 1px solid var(--border); }
  .ai-content tr:nth-child(even) td { background: var(--bg); }
  .ai-content .highlight-box { background: var(--green-light); border-left: 3px solid var(--green); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; padding: 0.75rem 1rem; margin: 0.75rem 0; font-size: 0.875rem; color: var(--green-dark); }
  .ai-content strong { font-weight: 600; }
  .profile-bar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--white); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--text-2); }
  .profile-flags { display: flex; gap: 2px; font-size: 1.1rem; }
  .profile-change { margin-left: auto; font-size: 0.8rem; color: var(--text-3); cursor: pointer; background: none; border: none; font-family: 'DM Sans', sans-serif; }
  .profile-change:hover { color: var(--text); }
  .section-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-3); margin-bottom: 0.75rem; }
  .ask-more { margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .ask-input-row { display: flex; gap: 8px; }
  .ask-input-row input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 0.875rem; background: var(--white); color: var(--text); }
  .ask-input-row input:focus { outline: 2px solid var(--green); border-color: var(--green); }
  @media (max-width: 480px) { nav { padding: 1rem; } .hero { padding: 2rem 1rem 1.5rem; } .container { padding: 0 1rem 3rem; } }
</style>
</head>
<body>

<nav>
  <div class="logo"><div class="logo-dot"></div> Polyglot</div>
  <div class="nav-right">Beta</div>
</nav>

<div id="screen-setup" class="screen active">
  <div class="hero">
    <h1>用你已会的语言<br>学一门新语言</h1>
    <p>AI 会根据你的语言背景量身设计课程——用最合适的语言来帮你理解每一个知识点。</p>
  </div>
  <div class="container">
    <div class="steps">
      <div class="step-dot active" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
    </div>
    <div id="step1">
      <div class="card">
        <div class="card-title">你已经掌握哪些语言？</div>
        <div class="card-sub">点一次 = 设为母语（蓝色），再点 = 已掌握（绿色），再点 = 取消</div>
        <div class="lang-grid" id="known-grid"></div>
      </div>
      <div class="btn-row">
        <button class="btn primary" onclick="goStep2()">下一步 →</button>
      </div>
    </div>
    <div id="step2" style="display:none;">
      <div class="card">
        <div class="card-title">你想学哪门语言？</div>
        <div class="card-sub">选择你的目标语言</div>
        <div class="lang-grid" id="target-grid"></div>
      </div>
      <div class="btn-row">
        <button class="btn ghost" onclick="goStep1()">← 返回</button>
        <button class="btn primary" onclick="startLearning()">开始学习 →</button>
      </div>
    </div>
  </div>
</div>

<div id="screen-course" class="screen">
  <div class="container" style="padding-top: 2rem;">
    <div class="profile-bar">
      <div class="profile-flags" id="profile-flags"></div>
      <span id="profile-text"></span>
      <button class="profile-change" onclick="showScreen('screen-setup')">修改语言</button>
    </div>
    <div class="section-label">课程大纲</div>
    <div id="lesson-list"></div>
  </div>
</div>

<div id="screen-lesson" class="screen">
  <div class="container" style="padding-top: 2rem;">
    <button class="back-btn" onclick="showScreen('screen-course')">← 返回课程</button>
    <div style="margin-bottom: 1rem;">
      <div class="section-label" id="lesson-tag-display"></div>
      <h2 style="font-size: 1.3rem; font-weight: 600;" id="lesson-h2"></h2>
    </div>
    <div class="lesson-content-area" id="lesson-content"></div>
    <div class="ask-more" id="ask-more-area" style="display:none;">
      <p style="font-size:0.85rem; color:var(--text-3); margin-bottom:0.75rem;">有问题？继续问 AI：</p>
      <div class="ask-input-row">
        <input type="text" id="follow-up-input" placeholder="例如：能不能再举个例子？" onkeydown="if(event.key==='Enter') askFollowUp()" />
        <button class="btn primary" onclick="askFollowUp()">发送</button>
      </div>
    </div>
  </div>
</div>

<script>
const LANGUAGES = [
  { code:'zh', flag:'🇨🇳', name:'中文', family:'sino' },
  { code:'en', flag:'🇬🇧', name:'英语', family:'germanic' },
  { code:'es', flag:'🇪🇸', name:'西班牙语', family:'romance' },
  { code:'fr', flag:'🇫🇷', name:'法语', family:'romance' },
  { code:'it', flag:'🇮🇹', name:'意大利语', family:'romance' },
  { code:'pt', flag:'🇧🇷', name:'葡萄牙语', family:'romance' },
  { code:'de', flag:'🇩🇪', name:'德语', family:'germanic' },
  { code:'ja', flag:'🇯🇵', name:'日语', family:'japonic' },
  { code:'ko', flag:'🇰🇷', name:'韩语', family:'koreanic' },
  { code:'ru', flag:'🇷🇺', name:'俄语', family:'slavic' },
  { code:'ar', flag:'🇸🇦', name:'阿拉伯语', family:'semitic' },
  { code:'hi', flag:'🇮🇳', name:'印地语', family:'indo' },
];

const LESSONS = [
  { id:'pronouns',  title:'人称代词',                  tag:'语法',  tagClass:'tag-grammar'  },
  { id:'greeting',  title:'打招呼与自我介绍',            tag:'词汇',  tagClass:'tag-vocab'    },
  { id:'numbers',   title:'数字 1–100',                 tag:'词汇',  tagClass:'tag-vocab'    },
  { id:'verbs1',    title:'核心动词：是、有、去',         tag:'语法',  tagClass:'tag-grammar'  },
  { id:'transfer',  title:'语言迁移：哪些词你已经认识',   tag:'迁移',  tagClass:'tag-transfer' },
  { id:'sentence',  title:'基本句型结构',                tag:'语法',  tagClass:'tag-grammar'  },
];

let state = { native: null, known: [], target: null };
let currentLesson = null;
let conversationHistory = [];

renderKnownGrid();

function getLang(code) { return LANGUAGES.find(l => l.code === code); }

function renderKnownGrid() {
  const g = document.getElementById('known-grid');
  g.innerHTML = '';
  LANGUAGES.forEach(lang => {
    const isNative = state.native === lang.code;
    const isKnown  = state.known.includes(lang.code);
    const btn = document.createElement('button');
    btn.className = 'lang-btn' + (isNative ? ' native' : isKnown ? ' known' : '');
    btn.innerHTML = `<span class="lang-flag">${lang.flag}</span><span class="lang-name">${lang.name}</span>${isNative ? '<span class="lang-status native">母语</span>' : isKnown ? '<span class="lang-status known">已掌握</span>' : ''}`;
    btn.onclick = () => toggleKnown(lang.code);
    g.appendChild(btn);
  });
}

function toggleKnown(code) {
  if (state.native === code) { state.native = null; }
  else if (state.known.includes(code)) { state.known = state.known.filter(c => c !== code); }
  else if (!state.native) { state.native = code; }
  else { if (!state.known.includes(code)) state.known.push(code); }
  renderKnownGrid();
}

function renderTargetGrid() {
  const g = document.getElementById('target-grid');
  g.innerHTML = '';
  const excluded = [state.native, ...state.known].filter(Boolean);
  LANGUAGES.filter(l => !excluded.includes(l.code)).forEach(lang => {
    const isTarget = state.target === lang.code;
    const btn = document.createElement('button');
    btn.className = 'lang-btn' + (isTarget ? ' known' : '');
    btn.innerHTML = `<span class="lang-flag">${lang.flag}</span><span class="lang-name">${lang.name}</span>${isTarget ? '<span class="lang-status known">目标</span>' : ''}`;
    btn.onclick = () => { state.target = lang.code; renderTargetGrid(); };
    g.appendChild(btn);
  });
}

function goStep2() {
  if (!state.native) { alert('请先点选你的母语'); return; }
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
  document.getElementById('dot2').classList.add('active');
  renderTargetGrid();
}

function goStep1() {
  document.getElementById('step2').style.display = 'none';
  document.getElementById('step1').style.display = 'block';
  document.getElementById('dot2').classList.remove('active');
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function startLearning() {
  if (!state.target) { alert('请选择你想学习的语言'); return; }
  renderCourse();
  showScreen('screen-course');
}

function renderCourse() {
  const native = getLang(state.native);
  const target = getLang(state.target);
  const knownLangs = state.known.map(getLang);
  document.getElementById('profile-flags').textContent = [native, ...knownLangs].map(l => l.flag).join(' ');
  document.getElementById('profile-text').textContent = `正在学 ${target.flag} ${target.name}`;
  const list = document.getElementById('lesson-list');
  list.innerHTML = '';
  LESSONS.forEach((lesson, i) => {
    const div = document.createElement('div');
    div.className = 'lesson-item';
    div.innerHTML = `<div class="lesson-meta"><span class="lesson-num">第 ${i+1} 课</span><span class="tag ${lesson.tagClass}">${lesson.tag}</span></div><div class="lesson-title">${lesson.title}</div><div class="lesson-preview">点击让 AI 根据你的语言背景生成专属讲解</div>`;
    div.onclick = () => openLesson(lesson);
    list.appendChild(div);
  });
}

function openLesson(lesson) {
  currentLesson = lesson;
  conversationHistory = [];
  document.getElementById('lesson-tag-display').textContent = lesson.tag;
  document.getElementById('lesson-h2').textContent = lesson.title;
  document.getElementById('ask-more-area').style.display = 'none';
  document.getElementById('follow-up-input').value = '';
  showScreen('screen-lesson');
  generateLesson(lesson);
}

async function callAPI(messages, system) {
  const response = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 1500,
      system,
      messages
    })
  });
  return response.json();
}

function buildSystem() {
  const native = getLang(state.native);
  const target = getLang(state.target);
  const knownLangs = state.known.map(getLang);
  return `你是一位专业的语言教师，擅长利用学习者的已有语言知识来讲解新语言。

学习者信息：
- 母语：${native.name}
- 已掌握的语言：${knownLangs.length > 0 ? knownLangs.map(l=>l.name).join('、') : '无'}
- 正在学习：${target.name}

教学原则：
1. 默认用学习者母语（${native.name}）讲解
2. 当某个知识点用其他已知语言举例更直观时，切换到那门语言举例
3. 主动指出目标语言和学习者已知语言之间的相似点和差异
4. 在关键记忆点用 💡 开头写一个"迁移提示"
5. 用 Markdown 格式回复（### 标题，**加粗**，标准 Markdown 表格）
6. 长度适中，聚焦在本课核心知识点`;
}

async function generateLesson(lesson) {
  const contentArea = document.getElementById('lesson-content');
  contentArea.innerHTML = '<div class="loading"><div class="spinner"></div> AI 正在根据你的语言背景生成专属讲解…</div>';
  const native = getLang(state.native);
  const target = getLang(state.target);
  const knownLangs = state.known.map(getLang);
  const userMsg = `请为我讲解"${lesson.title}"这节课。充分利用我的${native.name}背景${knownLangs.length > 0 ? `和${knownLangs.map(l=>l.name).join('、')}知识` : ''}来帮助我理解${target.name}的这个知识点。`;
  conversationHistory.push({ role: 'user', content: userMsg });
  try {
    const data = await callAPI(conversationHistory, buildSystem());
    if (data.error) { contentArea.innerHTML = `<p style="color:red;">错误：${data.error.message}</p>`; return; }
    const text = data.content[0].text;
    conversationHistory.push({ role: 'assistant', content: text });
    contentArea.innerHTML = renderMarkdown(text);
    document.getElementById('ask-more-area').style.display = 'block';
  } catch (err) {
    contentArea.innerHTML = `<p style="color:red;">请求失败，请刷新页面重试。</p>`;
  }
}

async function askFollowUp() {
  const input = document.getElementById('follow-up-input');
  const question = input.value.trim();
  if (!question) return;
  input.value = '';
  const contentArea = document.getElementById('lesson-content');
  const prev = contentArea.innerHTML;
  contentArea.innerHTML = prev + '<div class="loading" style="margin-top:1rem;"><div class="spinner"></div> 思考中…</div>';
  conversationHistory.push({ role: 'user', content: question });
  try {
    const data = await callAPI(conversationHistory, buildSystem());
    const text = data.content[0].text;
    conversationHistory.push({ role: 'assistant', content: text });
    contentArea.innerHTML = prev + `<div style="margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border);"><p style="font-size:0.8rem;color:var(--text-3);margin-bottom:0.5rem;">你问：${question}</p>${renderMarkdown(text)}</div>`;
  } catch(err) {
    contentArea.innerHTML = prev + '<p style="color:red;margin-top:1rem;">请求失败，请重试。</p>';
  }
}

function renderMarkdown(text) {
  let html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)+)/g, (match, header, rows) => {
      const ths = header.split('|').filter(s=>s.trim()).map(s=>`<th>${s.trim()}</th>`).join('');
      const trs = rows.trim().split('\n').map(row => `<tr>${row.split('|').filter(s=>s.trim()).map(s=>`<td>${s.trim()}</td>`).join('')}</tr>`).join('');
      return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
    })
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/(💡[^\n]+)/g, '<div class="highlight-box">$1</div>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>');
  return `<div class="ai-content"><p>${html}</p></div>`;
}
</script>
</body>
</html>
